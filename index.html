<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Mnemosyne – Application de mémorisation">
<title>Mnemosyne</title>
<link rel="manifest" id="pwa-manifest">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1923;--bg2:#161f2b;--bg3:#1d2a38;
  --surface:#1d2a38;--surface2:#243040;
  --border:#2d3e52;--border2:#3a5068;
  --text:#e8e2d9;--text2:#9aacbb;--text3:#5c7285;
  --gold:#c9a84c;--gold2:#e8c96a;--gold-dim:#c9a84c22;
  --danger:#e05c5c;--danger-bg:#2a1515;
  --success:#5cba8a;--success-bg:#0f2a1d;
  --radius:10px;--radius-lg:14px;--radius-xl:20px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6}
button{cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:var(--radius);padding:8px 16px;transition:all .18s}
button:active{transform:scale(.97)}
input,textarea,select{font-family:'DM Sans',sans-serif;font-size:14px;border:1px solid var(--border);background:var(--bg3);color:var(--text);border-radius:var(--radius);padding:9px 13px;width:100%;outline:none;transition:border-color .18s}
input:focus,textarea:focus,select:focus{border-color:var(--gold)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--bg3)}
#root{display:flex;flex-direction:column;height:100%}
#topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#topbar-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--gold2);letter-spacing:.04em;cursor:pointer;flex:1}
#topbar-back{display:none;align-items:center;gap:5px;font-size:13px;color:var(--text2);border:none;padding:0;background:none}
#topbar-back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#topbar-actions{display:flex;gap:6px}
#topbar-actions button{padding:5px 11px;font-size:12px;color:var(--text2);border-color:var(--border)}
#topbar-actions button:hover{color:var(--text);border-color:var(--border2)}
#page{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#bottom-nav{flex-shrink:0;display:none;background:var(--bg);border-top:1px solid var(--border);height:60px}
#bottom-nav.visible{display:flex}
#bottom-nav button{flex:1;border:none;border-radius:0;padding:8px 4px 10px;font-size:10px;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:3px;background:none;font-weight:500;letter-spacing:.02em}
#bottom-nav button.active{color:var(--gold)}
#bottom-nav svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.desktop-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 16px;flex-shrink:0;overflow-x:auto}
.desktop-tabs button{border:none;border-bottom:2px solid transparent;border-radius:0;padding:11px 14px;font-size:13px;font-weight:500;color:var(--text3);white-space:nowrap;background:none}
.desktop-tabs button:hover{color:var(--text)}
.desktop-tabs button.active{color:var(--gold);border-bottom-color:var(--gold)}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--surface2);color:var(--text);padding:9px 18px;border-radius:var(--radius);font-size:13px;border:1px solid var(--border2);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.pane{padding:16px 16px 80px;max-width:740px;margin:0 auto;width:100%}
.home-header{text-align:center;padding:28px 16px 20px}
.home-header h1{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:var(--gold2);letter-spacing:.04em}
.home-header p{font-size:13px;color:var(--text3);margin-top:6px}
.subject-section{margin-bottom:22px}
.subject-label{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:0 2px;margin-bottom:9px;display:flex;align-items:center;gap:6px}
.subject-label-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
.course-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:13px;cursor:pointer;transition:border-color .18s,background .18s;display:flex;flex-direction:column;gap:5px;position:relative;min-height:80px}
.course-card:hover{border-color:var(--border2);background:var(--surface2)}
.course-card-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.3;padding-right:28px}
.course-card-meta{font-size:11px;color:var(--text3);margin-top:auto}
.course-card-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.course-card-edit{position:absolute;top:7px;right:7px;padding:3px 7px;font-size:11px;color:var(--text3);border-color:transparent;opacity:0;transition:opacity .15s;background:var(--bg3);border-radius:6px}
.course-card:hover .course-card-edit{opacity:1}
.add-course-btn{border:1px dashed var(--border);border-radius:var(--radius-lg);padding:13px;cursor:pointer;transition:border-color .18s,color .18s;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;color:var(--text3);background:transparent;width:100%;min-height:80px}
.add-course-btn:hover{border-color:var(--gold);color:var(--gold)}
.dot-anglais{background:#8b6ee0}.dot-français{background:#d4845a}.dot-géographie{background:#5cba8a}
.dot-géopolitique{background:#d46b5a}.dot-histoire{background:#c9a84c}.dot-is{background:#5a9fd4}
.dot-mathématiques{background:#4a9ee0}.dot-marine{background:#3db8c8}.dot-renseignement{background:#a06ee0}
.tag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500}
.tag-anglais{background:#8b6ee022;color:#b89de8}.tag-français{background:#d4845a22;color:#e8a882}
.tag-géographie{background:#5cba8a22;color:#85d4a8}.tag-géopolitique{background:#d46b5a22;color:#e89888}
.tag-histoire{background:#c9a84c22;color:#e8c96a}.tag-is{background:#5a9fd422;color:#88c2e8}
.tag-mathématiques{background:#4a9ee022;color:#7fc2f0}.tag-marine{background:#3db8c822;color:#7ad8e8}
.tag-renseignement{background:#a06ee022;color:#c898f0}
.course-hero{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.course-hero-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.course-hero h2{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--text);flex:1}
.fiche-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:9px;overflow:hidden}
.fiche-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:10px}
.fiche-header h3{font-size:14px;font-weight:500;color:var(--text);flex:1}
.fiche-chevron{width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s;flex-shrink:0}
.fiche-card.open .fiche-chevron{transform:rotate(180deg)}
.fiche-body{display:none;padding:12px 14px;font-size:13px;color:var(--text2);white-space:pre-wrap;line-height:1.75;border-top:1px solid var(--border)}
.fiche-card.open .fiche-body{display:block}
.del-btn{font-size:11px;color:var(--danger);border-color:var(--danger);background:var(--danger-bg);padding:4px 11px;margin-top:10px;display:inline-block}
.fc-perspective{perspective:1000px;height:190px;margin:12px 0;cursor:pointer}
.fc-inner{position:relative;width:100%;height:100%;transition:transform .45s;transform-style:preserve-3d}
.fc-perspective.flipped .fc-inner{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.fc-face.back{transform:rotateY(180deg);border-color:var(--gold);background:var(--bg3)}
.fc-face .lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.fc-face .word{font-size:19px;font-weight:500;color:var(--text);line-height:1.3}
.fc-face .hint{font-size:12px;color:var(--text3);margin-top:8px}
.fc-hint-tap{text-align:center;font-size:11px;color:var(--text3);margin-top:-2px;margin-bottom:10px}
.fc-buttons{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.fc-buttons button{padding:10px 22px;font-size:13px}
.btn-ok{background:var(--success-bg);color:var(--success);border-color:var(--success)}
.btn-ko{background:var(--danger-bg);color:var(--danger);border-color:var(--danger)}
.btn-gold{background:var(--gold-dim);color:var(--gold2);border-color:var(--gold)}
.btn-gold:hover{background:var(--gold);color:var(--bg)}
.progress-bar{height:3px;background:var(--bg3);border-radius:3px;margin-bottom:4px}
.progress-fill{height:3px;background:var(--gold);border-radius:3px;transition:width .35s}
.counter{font-size:12px;color:var(--text3);text-align:center;margin-bottom:10px}
.list-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px}
.list-item-body{flex:1;min-width:0}
.list-item-q{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.list-item-a{font-size:12px;color:var(--text2)}
.list-item-del{flex-shrink:0;padding:4px 10px;font-size:11px;color:var(--danger);border-color:var(--danger-bg);background:var(--danger-bg)}
.qcm-q{font-size:15px;font-weight:500;color:var(--text);margin-bottom:13px;line-height:1.5}
.qcm-opts{display:flex;flex-direction:column;gap:7px}
.qcm-opt{text-align:left;padding:11px 13px;border-radius:var(--radius);font-size:13px;color:var(--text2);border-color:var(--border)}
.qcm-opt:hover:not(:disabled){border-color:var(--gold);color:var(--text)}
.qcm-opt.correct{background:var(--success-bg);color:var(--success);border-color:var(--success)}
.qcm-opt.wrong{background:var(--danger-bg);color:var(--danger);border-color:var(--danger)}
.qcm-opt:disabled{cursor:default}
.qcm-expl{margin-top:10px;font-size:13px;color:var(--text2);background:var(--bg3);border-radius:var(--radius);padding:10px 12px;border-left:2px solid var(--gold);line-height:1.6}
.exo-statement{font-size:13px;line-height:1.75;padding:12px;background:var(--bg3);border-radius:var(--radius);border-left:2px solid var(--gold);white-space:pre-wrap;color:var(--text2);margin-bottom:9px}
.exo-correction{display:none;padding:12px;background:var(--success-bg);border-radius:var(--radius);border-left:2px solid var(--success);font-size:13px;line-height:1.75;white-space:pre-wrap;color:var(--text2);margin-top:8px}
.exo-correction.open{display:block}
.form-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:12px}
.form-section h3{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.form-row{display:flex;gap:9px;margin-bottom:9px;flex-wrap:wrap}
.form-group{flex:1;min-width:130px}
.form-group label{display:block;font-size:12px;color:var(--text3);margin-bottom:4px}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px}
.opts-grid label{font-size:11px;color:var(--text3);display:block;margin-bottom:3px}
.mode-toggle{display:flex;gap:6px;margin-bottom:12px}
.mode-toggle button{font-size:12px;padding:5px 13px;color:var(--text3)}
.mode-toggle button.active{color:var(--gold);border-color:var(--gold);background:var(--gold-dim)}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.done-box{text-align:center;padding:36px 16px}
.done-box .emoji{font-size:38px;margin-bottom:10px}
.done-box .title{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold2);margin-bottom:6px}
.done-box .score{font-size:28px;font-weight:600;color:var(--gold);margin-bottom:4px}
.empty{text-align:center;color:var(--text3);padding:36px 16px;font-size:13px}
.empty svg{width:38px;height:38px;stroke:var(--border2);fill:none;stroke-width:1.5;margin:0 auto 10px;display:block}
#modal-overlay{display:none;position:fixed;inset:0;background:#000a;z-index:200;align-items:flex-end;justify-content:center}
#modal-overlay.open{display:flex}
#modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xl) var(--radius-xl) 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:20px 18px 40px}
#modal h2{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold2);margin-bottom:14px}
#modal .modal-btns{display:flex;gap:9px;margin-top:14px;flex-wrap:wrap}
#modal .form-group{margin-bottom:11px}
#modal label{display:block;font-size:12px;color:var(--text3);margin-bottom:4px}
</style>
</head>
<body>
<div id="root">
  <div id="topbar">
    <button id="topbar-back" onclick="goHome()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Accueil
    </button>
    <div id="topbar-title" onclick="goHome()">Mnemosyne</div>
    <div id="topbar-actions">
      <button onclick="exportData()">↑ Export</button>
      <button onclick="document.getElementById('import-file').click()">↓ Import</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
  <div id="course-tabs" class="desktop-tabs" style="display:none"></div>
  <div id="page"></div>
  <div id="bottom-nav">
    <button id="bn-fiches" onclick="switchTab('fiches')">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>Fiches
    </button>
    <button id="bn-flashcards" onclick="switchTab('flashcards')">
      <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Cartes
    </button>
    <button id="bn-qcm" onclick="switchTab('qcm')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>QCM
    </button>
    <button id="bn-exercices" onclick="switchTab('exercices')">
      <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Exos
    </button>
    <button id="bn-edit" onclick="switchTab('edit')">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Gérer
    </button>
  </div>
</div>
<div id="modal-overlay" onclick="closeModalOverlay(event)"><div id="modal"></div></div>
<div id="toast"></div>
<script>
const SUBJECTS=['Anglais','Français','Géographie','Géopolitique','Histoire','IS','Mathématiques','Marine','Renseignement'];
const SC={Anglais:'anglais',Français:'français',Géographie:'géographie',Géopolitique:'géopolitique',Histoire:'histoire',IS:'is',Mathématiques:'mathématiques',Marine:'marine',Renseignement:'renseignement'};

const SAMPLE={courses:[
  {id:1,name:"Vocabulaire maritime",subject:"Marine",
   fiches:[{id:1,title:"Côtés du navire",content:"Bâbord : gauche (feu rouge).\nTribord : droite (feu vert).\nProue : avant. Poupe : arrière.\nÉtrave : pièce avant de la carène.\nÉtambot : pièce arrière."},{id:2,title:"Grades officiers mariniers",content:"QM2 → QM1 → Second-maître → Maître → Premier-maître → Maître principal\n\nOfficiers :\nEV2 → EV1 → LV → CC → CF → CV → CA → VA → Amiral"}],
   flashcards:[{id:1,q:"Pavillon Alpha",a:"Plongée en cours – garder distance",hint:"Code signaux"},{id:2,q:"Bâbord ?",a:"Côté gauche – feu rouge",hint:"Navigation"}],
   qcm:[{id:1,q:"Grade après Capitaine de corvette ?",opts:["Capitaine de vaisseau","Lieutenant de vaisseau","Capitaine de frégate","Contre-amiral"],ans:2,expl:"Ordre : LV → CC → CF → CV → CA."}],
   exercices:[{id:1,title:"Feux de navigation",statement:"Un navire approche à tribord avec feux vert et blanc. Quelle manœuvre ?",correction:"Feu vert = tribord du croiseur. Selon COLREG, vous êtes privilégié : maintenez cap et vitesse. Le croiseur doit vous éviter."}]},
  {id:2,name:"Figures de style",subject:"Français",
   fiches:[{id:1,title:"Figures principales",content:"Métaphore : comparaison sans outil.\nComparaison : avec 'comme/tel'.\nPersonnification : attributs humains.\nAnaphore : répétition en début de phrase.\nHyperbole : exagération.\nLitote : dire moins pour suggérer plus."}],
   flashcards:[{id:1,q:"Métonymie ?",a:"Désigner une chose par une autre associée (ex: 'boire un verre')",hint:"Rhétorique"},{id:2,q:"Métaphore vs comparaison ?",a:"Comparaison : outil (comme, tel). Métaphore : assimilation directe.",hint:"Figures"}],
   qcm:[{id:1,q:"'Il pleut des cordes' est une…",opts:["Comparaison","Métaphore","Hyperbole","Personnification"],ans:1,expl:"Métaphore : pluie assimilée à des cordes sans outil comparatif."}],
   exercices:[{id:1,title:"Introduction de commentaire",statement:"Rédigez une introduction pour un extrait au choix :\n1. Accroche\n2. Présentation du texte\n3. Problématique\n4. Annonce du plan",correction:"Accroche → Présentation (auteur, œuvre, date, mouvement) → Problématique (question ouverte) → Plan annoncé.\nÀ éviter : paraphrase, plan descriptif, oubli de la problématique."}]},
  {id:3,name:"Détroits et routes commerciales",subject:"Géographie",
   fiches:[{id:1,title:"Détroits stratégiques",content:"Gibraltar : Europe/Afrique, 14 km — Méd./Atlantique.\nOrmuz : Golfe Persique, 20% pétrole mondial.\nMalacca : Asie SE, route Chine-Inde-Europe.\nBosphore : Istanbul, accès mer Noire.\nDovres : Manche, N.-Europe."}],
   flashcards:[{id:1,q:"Surface mer Méditerranée ?",a:"2,5 M km² — prof. max 5 267 m (fosse Calypso)",hint:"Géo physique"},{id:2,q:"Qui contrôle Ormuz ?",a:"Iran (rive nord) et Oman (rive sud)",hint:"Pétrole"}],
   qcm:[{id:1,q:"Quel détroit sépare Europe et Afrique ?",opts:["Détroit de Sicile","Détroit de Messine","Détroit de Gibraltar","Bosphore"],ans:2,expl:"Gibraltar (14 km) entre Espagne et Maroc."}],
   exercices:[]},
  {id:4,name:"Organisations internationales",subject:"Géopolitique",
   fiches:[{id:1,title:"Principales organisations",content:"ONU (1945) : 193 membres. Siège NY.\nOTAN (1949) : alliance défensive, 31 membres.\nUE (1993, Maastricht) : 27 membres.\nG7/G20 : forums économiques.\nFMI & BM : Bretton Woods (1944)."}],
   flashcards:[{id:1,q:"OTAN ?",a:"Alliance militaire (1949) – art. 5 = défense collective",hint:"Sécurité"},{id:2,q:"Siège ONU ?",a:"New York (siège principal)",hint:"Institutions"}],
   qcm:[{id:1,q:"Siège du Conseil de sécurité de l'ONU ?",opts:["Genève","Paris","New York","Vienne"],ans:2,expl:"New York depuis 1946."}],
   exercices:[{id:1,title:"Détroit d'Ormuz",statement:"Trois intérêts stratégiques d'Ormuz ? Développez chaque point.",correction:"1. Énergie : 20% pétrole mondial.\n2. Tension Iran/Occident : levier des sanctions.\n3. Présence US : 5e flotte à Bahreïn."}]},
  {id:5,name:"Analyse et algèbre",subject:"Mathématiques",
   fiches:[{id:1,title:"Dérivées et primitives",content:"xⁿ → nxⁿ⁻¹ | eˣ → eˣ | ln(x) → 1/x\nsin(x) → cos(x) | cos(x) → −sin(x)\n∫sin(x) = −cos(x)+C | ∫cos(x) = sin(x)+C\n∫eˣ = eˣ+C | ∫1/x = ln|x|+C"}],
   flashcards:[{id:1,q:"Dérivée de ln(x) ?",a:"1/x (x>0)",hint:"Analyse"},{id:2,q:"∫sin(x) ?",a:"−cos(x)+C",hint:"Intégration"},{id:3,q:"lim sin(x)/x, x→0 ?",a:"1",hint:"Limites"}],
   qcm:[{id:1,q:"Limite de sin(x)/x quand x→0 ?",opts:["0","1","∞","Indéterminée"],ans:1,expl:"Limite fondamentale, démontrable par L'Hôpital."}],

function load(){try{const s=localStorage.getItem('mnemosyne_v2');if(s)return JSON.parse(s);}catch(e){}return JSON.parse(JSON.stringify(SAMPLE));}
function save(){try{localStorage.setItem('mnemosyne_v2',JSON.stringify(DB));}catch(e){}}
let DB=load();
let currentCourseId=null,currentTab='fiches';
let fcQueue=[],fcIdx=0,fcMode='revise';
let qcmList=[],qcmIdx=0,qcmScore=0,qcmDone=false,qcmMode='play';

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function uid(){return Date.now()+Math.floor(Math.random()*9999);}
function v(id){return document.getElementById(id)?.value?.trim()||'';}

function goHome(){
  currentCourseId=null;
  document.getElementById('topbar-back').style.display='none';
  document.getElementById('topbar-title').style.display='block';
  document.getElementById('bottom-nav').classList.remove('visible');
  document.getElementById('course-tabs').style.display='none';
  renderHome();
}
function openCourse(id){
  currentCourseId=id;
  fcQueue=[];fcIdx=0;qcmList=[];qcmIdx=0;qcmScore=0;qcmDone=false;fcMode='revise';qcmMode='play';
  document.getElementById('topbar-back').style.display='flex';
  document.getElementById('topbar-title').style.display='none';
  document.getElementById('bottom-nav').classList.add('visible');
  renderCourseTabs();
  switchTab('fiches');
}
function switchTab(tab){
  currentTab=tab;
  ['fiches','flashcards','qcm','exercices','edit'].forEach(t=>{
    const bn=document.getElementById('bn-'+t);if(bn)bn.classList.toggle('active',t===tab);
  });
  document.querySelectorAll('#course-tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  renderCourseView();
}
function renderCourseTabs(){
  const ct=document.getElementById('course-tabs');ct.style.display='flex';
  const labels={fiches:'Fiches',flashcards:'Flashcards',qcm:'QCM',exercices:'Exercices',edit:'Gérer'};
  ct.innerHTML=['fiches','flashcards','qcm','exercices','edit'].map(t=>`<button data-tab="${t}" class="${t===currentTab?'active':''}" onclick="switchTab('${t}')">${labels[t]}</button>`).join('');
}

function renderHome(){
  const bySubject={};
  DB.courses.forEach(c=>{if(!bySubject[c.subject])bySubject[c.subject]=[];bySubject[c.subject].push(c);});
  let html=`<div class="home-header"><h1>Mnemosyne</h1><p>Sélectionne un cours pour commencer</p></div><div class="pane">`;
  SUBJECTS.forEach(sub=>{
    const list=bySubject[sub]||[];
    const col=SC[sub]||'';
    html+=`<div class="subject-section">
      <div class="subject-label"><span class="subject-label-dot dot-${col}"></span>${sub}</div>
      <div class="courses-grid">
        ${list.map(c=>`<div class="course-card" onclick="openCourse(${c.id})">
          <div style="display:flex;align-items:flex-start;gap:7px">
            <div class="course-card-dot dot-${SC[c.subject]||''}" style="margin-top:4px"></div>
            <div class="course-card-title">${escH(c.name)}</div>
          </div>
          <div class="course-card-meta">${c.fiches.length}F · ${c.flashcards.length}FC · ${c.qcm.length}Q · ${c.exercices.length}E</div>
          <button class="course-card-edit" onclick="event.stopPropagation();openEditCourse(${c.id})">✎</button>
        </div>`).join('')}
        <button class="add-course-btn" onclick="openAddCourse('${sub}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouveau cours
        </button>
      </div>
    </div>`;
  });
  html+=`</div>`;
  document.getElementById('page').innerHTML=html;
}

function getCourse(){return DB.courses.find(c=>c.id===currentCourseId);}
function renderCourseView(){
  const c=getCourse();if(!c)return goHome();
  const col=SC[c.subject]||'';
  let html=`<div class="course-hero"><div class="course-hero-dot dot-${col}"></div><h2>${escH(c.name)}</h2><span class="tag tag-${col}">${escH(c.subject)}</span></div>`;
  if(currentTab==='fiches')html+=renderFiches(c);
  else if(currentTab==='flashcards')html+=renderFlashcards(c);
  else if(currentTab==='qcm')html+=renderQCM(c);
  else if(currentTab==='exercices')html+=renderExercices(c);
  else if(currentTab==='edit')html+=renderEdit(c);
  document.getElementById('page').innerHTML=html;
}

function renderFiches(c){
  if(!c.fiches.length)return`<div class="pane"><div class="empty"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg><p>Aucune fiche.<br>Ajoute-en via "Gérer".</p></div></div>`;
  return`<div class="pane">${c.fiches.map(f=>`<div class="fiche-card" id="fi-${f.id}">
    <div class="fiche-header" onclick="document.getElementById('fi-${f.id}').classList.toggle('open')">
      <h3>${escH(f.title)}</h3><svg class="fiche-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="fiche-body">${escH(f.content)}<br><button class="del-btn" onclick="delFiche(${f.id})">Supprimer</button></div>
  </div>`).join('')}</div>`;
}
function delFiche(id){if(!confirm('Supprimer cette fiche ?'))return;const c=getCourse();c.fiches=c.fiches.filter(x=>x.id!==id);save();renderCourseView();toast('Fiche supprimée');}

function renderFlashcards(c){
  let html=`<div class="pane"><div class="mode-toggle">
    <button class="${fcMode==='revise'?'active':''}" onclick="fcMode='revise';fcQueue=[];fcIdx=0;renderCourseView()">Réviser</button>
    <button class="${fcMode==='list'?'active':''}" onclick="fcMode='list';renderCourseView()">Liste</button>
  </div>`;
  if(fcMode==='list'){
    if(!c.flashcards.length)html+=`<div class="empty"><p>Aucune flashcard.</p></div>`;
    else html+=c.flashcards.map(f=>`<div class="list-item"><div class="list-item-body"><div class="list-item-q">${escH(f.q)}</div><div class="list-item-a">${escH(f.a)}</div>${f.hint?`<div style="font-size:11px;color:var(--text3)">${escH(f.hint)}</div>`:''}</div><button class="list-item-del" onclick="delFC(${f.id})">✕</button></div>`).join('');
    return html+'</div>';
  }
  if(!fcQueue.length){fcQueue=[...c.flashcards].sort(()=>Math.random()-.5);fcIdx=0;}
  if(!fcQueue.length)return html+`<div class="empty"><p>Aucune flashcard.</p></div></div>`;
  if(fcIdx>=fcQueue.length)return html+`<div class="done-box"><div class="emoji">✓</div><div class="title">Série terminée !</div><div style="font-size:13px;color:var(--text3);margin-bottom:18px">${fcQueue.length} cartes révisées</div><button class="btn-gold" onclick="fcQueue=[];fcIdx=0;renderCourseView()">Recommencer</button></div></div>`;
  const fc=fcQueue[fcIdx];
  return html+`<div class="progress-bar"><div class="progress-fill" style="width:${Math.round(fcIdx/fcQueue.length*100)}%"></div></div>
  <div class="counter">${fcIdx+1} / ${fcQueue.length}</div>
  <div class="fc-perspective" id="fc-card" onclick="flipFC()" tabindex="0" role="button" onkeydown="if(event.key==='Enter'||event.key===' ')flipFC()">
    <div class="fc-inner"><div class="fc-face front"><div class="lbl">Question</div><div class="word">${escH(fc.q)}</div>${fc.hint?`<div class="hint">${escH(fc.hint)}</div>`:''}</div>
    <div class="fc-face back"><div class="lbl">Réponse</div><div class="word" style="font-size:16px">${escH(fc.a)}</div></div></div>
  </div>
  <p class="fc-hint-tap">Appuyer pour retourner</p>
  <div class="fc-buttons"><button class="btn-ko" onclick="fcAns(false)">✕ À revoir</button><button class="btn-ok" onclick="fcAns(true)">✓ Connu</button></div></div>`;
}
function flipFC(){document.getElementById('fc-card')?.classList.toggle('flipped');}
function fcAns(ok){if(!ok)fcQueue.push(fcQueue[fcIdx]);fcIdx++;document.getElementById('fc-card')?.classList.remove('flipped');renderCourseView();}
function delFC(id){if(!confirm('Supprimer ?'))return;const c=getCourse();c.flashcards=c.flashcards.filter(x=>x.id!==id);fcQueue=fcQueue.filter(x=>x.id!==id);save();renderCourseView();toast('Flashcard supprimée');}

function renderQCM(c){
  let html=`<div class="pane"><div class="mode-toggle">
    <button class="${qcmMode==='play'?'active':''}" onclick="qcmMode='play';qcmList=[];qcmIdx=0;qcmScore=0;qcmDone=false;renderCourseView()">Jouer</button>
    <button class="${qcmMode==='list'?'active':''}" onclick="qcmMode='list';renderCourseView()">Liste</button>
  </div>`;
  if(qcmMode==='list'){
    if(!c.qcm.length)html+=`<div class="empty"><p>Aucune question.</p></div>`;
    else html+=c.qcm.map(q=>`<div class="list-item"><div class="list-item-body"><div class="list-item-q">${escH(q.q)}</div><div class="list-item-a" style="margin-top:4px">${q.opts.map((o,i)=>`<span style="margin-right:8px">${i===q.ans?'<b style="color:var(--success)">✓</b>':'○'} ${escH(o)}</span>`).join('')}</div></div><button class="list-item-del" onclick="delQCM(${q.id})">✕</button></div>`).join('');
    return html+'</div>';
  }
  if(!qcmList.length){qcmList=[...c.qcm].sort(()=>Math.random()-.5);qcmIdx=0;qcmScore=0;qcmDone=false;}
  if(!qcmList.length)return html+`<div class="empty"><p>Aucune question.</p></div></div>`;
  if(qcmDone){
    const pct=Math.round(qcmScore/qcmList.length*100);
    return html+`<div class="done-box"><div class="emoji">${pct>=70?'🎉':pct>=40?'👍':'📚'}</div><div class="title">Quiz terminé</div><div class="score">${qcmScore}/${qcmList.length}</div><div class="progress-bar" style="max-width:160px;margin:10px auto"><div class="progress-fill" style="width:${pct}%"></div></div><div style="font-size:13px;color:var(--text3);margin-bottom:18px">${pct>=70?'Excellent !':pct>=40?'Bon travail !':'Continuez !'}</div><button class="btn-gold" onclick="qcmList=[];qcmIdx=0;qcmScore=0;qcmDone=false;renderCourseView()">Rejouer</button></div></div>`;
  }
  const q=qcmList[qcmIdx];
  return html+`<div class="progress-bar"><div class="progress-fill" style="width:${Math.round(qcmIdx/qcmList.length*100)}%"></div></div>
  <div style="text-align:right;font-size:12px;color:var(--text3);margin-bottom:10px">${qcmIdx+1}/${qcmList.length}</div>
  <p class="qcm-q">${escH(q.q)}</p>
  <div class="qcm-opts" id="qcm-opts">${q.opts.map((o,i)=>`<button class="qcm-opt" onclick="ansQCM(${i})">${escH(o)}</button>`).join('')}</div>
  <div id="qcm-expl" style="display:none"></div>
  <div id="qcm-next" style="display:none;text-align:right;margin-top:10px"><button class="btn-gold" onclick="nextQCM()">Suivant →</button></div></div>`;
}
function ansQCM(i){
  const q=qcmList[qcmIdx];
  document.querySelectorAll('.qcm-opt').forEach((b,idx)=>{b.disabled=true;if(idx===q.ans)b.classList.add('correct');else if(idx===i)b.classList.add('wrong');});
  if(i===q.ans)qcmScore++;
  const ex=document.getElementById('qcm-expl');ex.style.display='block';ex.className='qcm-expl';ex.textContent=q.expl;
  document.getElementById('qcm-next').style.display='block';
}
function nextQCM(){qcmIdx++;if(qcmIdx>=qcmList.length)qcmDone=true;renderCourseView();}
function delQCM(id){if(!confirm('Supprimer ?'))return;const c=getCourse();c.qcm=c.qcm.filter(x=>x.id!==id);qcmList=qcmList.filter(x=>x.id!==id);save();renderCourseView();toast('Question supprimée');}

function renderExercices(c){
  if(!c.exercices.length)return`<div class="pane"><div class="empty"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/></svg><p>Aucun exercice.</p></div></div>`;
  return`<div class="pane">${c.exercices.map(e=>`<div class="fiche-card" id="ex-${e.id}">
    <div class="fiche-header" onclick="document.getElementById('ex-${e.id}').classList.toggle('open')">
      <h3>${escH(e.title)}</h3><svg class="fiche-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="fiche-body">
      <div class="exo-statement">${escH(e.statement)}</div>
      <button onclick="toggleCorr(${e.id})" style="font-size:12px;color:var(--text2);padding:5px 12px">Voir la correction</button>
      <div class="exo-correction" id="corr-${e.id}">${escH(e.correction)}</div>
      <button class="del-btn" onclick="delExo(${e.id})">Supprimer</button>
    </div>
  </div>`).join('')}</div>`;
}
function toggleCorr(id){const el=document.getElementById('corr-'+id);el.classList.toggle('open');el.previousElementSibling.textContent=el.classList.contains('open')?'Masquer':'Voir la correction';}
function delExo(id){if(!confirm('Supprimer ?'))return;const c=getCourse();c.exercices=c.exercices.filter(x=>x.id!==id);save();renderCourseView();toast('Exercice supprimé');}

function renderEdit(c){
  return`<div class="pane">
  <div class="form-section"><h3>Nouvelle fiche</h3>
    <div class="form-group" style="margin-bottom:9px"><label>Titre</label><input id="nf-t" placeholder="Titre"></div>
    <div class="form-group"><label>Contenu</label><textarea id="nf-c" style="min-height:90px" placeholder="Contenu…"></textarea></div>
    <button class="btn-gold" style="margin-top:10px;width:100%" onclick="addFiche()">Ajouter la fiche</button>
  </div>
  <div class="form-section"><h3>Nouvelle flashcard</h3>
    <div class="form-row"><div class="form-group"><label>Recto (question)</label><input id="nfc-q" placeholder="Question…"></div><div class="form-group"><label>Verso (réponse)</label><input id="nfc-a" placeholder="Réponse…"></div></div>
    <div class="form-group"><label>Indice (optionnel)</label><input id="nfc-h" placeholder="Contexte…"></div>
    <button class="btn-gold" style="margin-top:10px;width:100%" onclick="addFC2()">Ajouter la flashcard</button>
  </div>
  <div class="form-section"><h3>Nouvelle question QCM</h3>
    <div class="form-group" style="margin-bottom:9px"><label>Question</label><input id="nq-q" placeholder="Question…"></div>
    <div class="opts-grid"><div><label>Option A</label><input id="nq-0" placeholder="A"></div><div><label>Option B</label><input id="nq-1" placeholder="B"></div><div><label>Option C</label><input id="nq-2" placeholder="C"></div><div><label>Option D</label><input id="nq-3" placeholder="D"></div></div>
    <div class="form-row"><div class="form-group" style="max-width:160px"><label>Bonne réponse</label><select id="nq-ans"><option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select></div></div>
    <div class="form-group"><label>Explication</label><textarea id="nq-e" style="min-height:55px" placeholder="Explication…"></textarea></div>
    <button class="btn-gold" style="margin-top:10px;width:100%" onclick="addQCM2()">Ajouter la question</button>
  </div>
  <div class="form-section"><h3>Nouvel exercice</h3>
    <div class="form-group" style="margin-bottom:9px"><label>Titre</label><input id="ne-t" placeholder="Titre…"></div>
    <div class="form-group" style="margin-bottom:9px"><label>Énoncé</label><textarea id="ne-s" style="min-height:70px" placeholder="Énoncé…"></textarea></div>
    <div class="form-group"><label>Correction</label><textarea id="ne-c" style="min-height:70px" placeholder="Correction…"></textarea></div>
    <button class="btn-gold" style="margin-top:10px;width:100%" onclick="addExo2()">Ajouter l'exercice</button>
  </div>
  <hr class="divider">
  <button onclick="openEditCourse(${c.id})" style="width:100%;color:var(--text2);margin-bottom:8px">✎ Renommer / changer la matière</button>
  <button onclick="delCourse(${c.id})" style="width:100%;color:var(--danger);border-color:var(--danger);background:var(--danger-bg)">✕ Supprimer ce cours</button>
  </div>`;
}
function addFiche(){const t=v('nf-t'),c2=v('nf-c');if(!t||!c2){toast('Titre et contenu requis');return;}getCourse().fiches.push({id:uid(),title:t,content:c2});save();toast('Fiche ajoutée ✓');renderCourseView();}
function addFC2(){const q=v('nfc-q'),a=v('nfc-a'),h=v('nfc-h');if(!q||!a){toast('Recto et verso requis');return;}getCourse().flashcards.push({id:uid(),q,a,hint:h});fcQueue=[];save();toast('Flashcard ajoutée ✓');renderCourseView();}
function addQCM2(){const q=v('nq-q'),opts=[v('nq-0'),v('nq-1'),v('nq-2'),v('nq-3')],e=v('nq-e'),ans=parseInt(document.getElementById('nq-ans').value);if(!q||opts.some(o=>!o)){toast('Question et 4 options requises');return;}getCourse().qcm.push({id:uid(),q,opts,ans,expl:e});qcmList=[];save();toast('Question ajoutée ✓');renderCourseView();}
function addExo2(){const t=v('ne-t'),s=v('ne-s'),c2=v('ne-c');if(!t||!s||!c2){toast('Tous les champs requis');return;}getCourse().exercices.push({id:uid(),title:t,statement:s,correction:c2});save();toast('Exercice ajouté ✓');renderCourseView();}

function openAddCourse(subject){
  document.getElementById('modal').innerHTML=`<h2>Nouveau cours</h2>
    <div class="form-group"><label>Nom du cours</label><input id="m-name" placeholder="Ex: Vocabulaire maritime…"></div>
    <div class="form-group"><label>Matière</label><select id="m-sub">${SUBJECTS.map(s=>`<option${s===subject?' selected':''}>${s}</option>`).join('')}</select></div>
    <div class="modal-btns"><button class="btn-gold" onclick="createCourse()">Créer</button><button onclick="closeModal()" style="color:var(--text3)">Annuler</button></div>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function createCourse(){
  const name=v('m-name'),sub=document.getElementById('m-sub').value;
  if(!name){toast('Nom requis');return;}
  const c={id:uid(),name,subject:sub,fiches:[],flashcards:[],qcm:[],exercices:[]};
  DB.courses.push(c);save();closeModal();toast('Cours créé ✓');openCourse(c.id);
}
function openEditCourse(id){
  const c=DB.courses.find(x=>x.id===id);
  document.getElementById('modal').innerHTML=`<h2>Modifier le cours</h2>
    <div class="form-group"><label>Nom</label><input id="m-name" value="${escH(c.name)}"></div>
    <div class="form-group"><label>Matière</label><select id="m-sub">${SUBJECTS.map(s=>`<option${s===c.subject?' selected':''}>${s}</option>`).join('')}</select></div>
    <div class="modal-btns"><button class="btn-gold" onclick="saveEditCourse(${id})">Enregistrer</button><button onclick="closeModal()" style="color:var(--text3)">Annuler</button></div>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function saveEditCourse(id){
  const name=v('m-name'),sub=document.getElementById('m-sub').value;
  if(!name){toast('Nom requis');return;}
  const c=DB.courses.find(x=>x.id===id);c.name=name;c.subject=sub;save();closeModal();toast('Cours modifié ✓');
  if(currentCourseId===id)renderCourseView();else renderHome();
}
function delCourse(id){
  if(!confirm('Supprimer ce cours et tout son contenu ?'))return;
  DB.courses=DB.courses.filter(x=>x.id!==id);save();toast('Cours supprimé');goHome();
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalOverlay(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='mnemosyne_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('Export téléchargé ✓');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.courses)throw 0;DB=d;save();toast('Import réussi ✓');goHome();}catch{toast('Fichier invalide ✗');}};
  r.readAsText(file);e.target.value='';
}

(function setupPWA(){
  const sw=`const C='mn-v3';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./'])));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./'))));});`;
  if(navigator.serviceWorker)navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{});
  const m={name:'Mnemosyne',short_name:'Mnemosyne',start_url:'.',display:'standalone',background_color:'#0f1923',theme_color:'#0f1923',icons:[{src:`data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f1923'/><text y='.9em' font-size='72' x='12'>📚</text></svg>`,sizes:'any',type:'image/svg+xml'}]};
  document.getElementById('pwa-manifest').href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}));
})();

goHome();
</script>
</body>
</html>
